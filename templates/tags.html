{% extends "base.html" %}
{% block title %}Теги{% endblock %}

{% block content %}
<h2>🏷️ Теги</h2>

<p>
  <a href="/" style="margin-right:12px;">🏠 На головну</a>
  <a href="/mixes" style="margin-right:12px;">📚 Список міксів</a>
  <a href="/tags/bubbles">🫧 Карта тегів</a>
</p>

<button id="toggleDelete" type="button">🗑️ Видалити теги</button>

<form id="deleteForm" method="post" action="/tags/delete" style="margin-top:12px; display:none;"
      onsubmit="return confirm('Ви впевнені, що бажаєте видалити вибрані теги? Вони також зникнуть з усіх міксів.');">
  <button type="submit" style="margin-bottom:12px;">✅ Підтвердити видалення вибраних</button>

  <div>
    {% for t in tags %}
      <div style="margin:6px 0;">
        <label>
          <input type="checkbox" name="tag_id" value="{{ t.id }}">
          <b>{{ t.name }}</b>
          <span style="color:gray;">(використано: {{ t.cnt }})</span>
        </label>
      </div>
    {% endfor %}
  </div>
</form>

<div id="normalList" style="margin-top:14px; display:flex; flex-wrap:wrap; gap:8px;">
  {% for t in tags %}
    <a href="/tag/{{ t.name }}"
       class="tag tagDisplay {% if t.name.startswith('artist: ') %}tag-artist{% endif %}"
       style="text-decoration:none; display:inline-flex; align-items:center; gap:6px;">
      {{ t.name }}
      <span class="tag-count">{{ t.cnt }}</span>
    </a>
  {% endfor %}
</div>

<script>
  const btn = document.getElementById("toggleDelete");
  const form = document.getElementById("deleteForm");
  const normal = document.getElementById("normalList");
  let active = false;

  btn.addEventListener("click", () => {
    active = !active;
    form.style.display = active ? "block" : "none";
    normal.style.display = active ? "none" : "block";
    btn.textContent = active ? "↩️ Скасувати видалення" : "🗑️ Видалити теги";
  });
</script>

{% endblock %}
