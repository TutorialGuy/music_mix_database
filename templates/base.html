<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Music Mix Database{% endblock %}</title>

    <style>
        html { scroll-behavior: smooth; }
    </style>

    {% block head %}{% endblock %}
</head>
<body>

<div id="top"></div>

{% block content %}{% endblock %}

<!-- Кнопка вгору (поки завжди видима; зробимо "тільки при скролі" пізніше) -->
<a href="#top"
   title="Вгору"
   style="
     position:fixed;
     right:18px;
     bottom:18px;
     background:#f2f2f2;
     border:1px solid #ccc;
     border-radius:12px;
     padding:10px 12px;
     text-decoration:none;
     color:#000;
     box-shadow:0 2px 6px rgba(0,0,0,0.15);
     html { scroll-behavior: smooth; }
     mark { padding: 0 2px; border-radius: 3px; }
   ">⬆️</a>

{% block scripts %}{% endblock %}

</body>
</html>
