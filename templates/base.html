<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Music Mix Database{% endblock %}</title>

    <style>
        html { scroll-behavior: smooth; }
    </style>

    {% block head %}{% endblock %}
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div id="top"></div>
<div class="container">

{% block content %}{% endblock %}

<!-- Кнопка вгору (поки завжди видима; зробимо "тільки при скролі" пізніше) -->
<a id="btnTop" href="#top"
   title="Вгору"
   style="
     position:fixed;
     right:18px;
     bottom:18px;
     background:#f2f2f2;
     border:1px solid #ccc;
     border-radius:12px;
     padding:10px 12px;
     text-decoration:none;
     color:#000;
     box-shadow:0 2px 6px rgba(0,0,0,0.15);

     display:none;          /* ⬅️ стартово прихована */
     opacity:0;
     transition:opacity .2s;
   ">⬆️</a>


{% block scripts %}{% endblock %}

<script>
(function () {
  const btn = document.getElementById("btnTop");
  if (!btn) return;

  function update() {
    // показувати, якщо прокручено вниз хоча б на 200px
    const y = window.scrollY || document.documentElement.scrollTop;

    if (y > 200) {
      btn.style.display = "block";
      btn.style.opacity = "1";
    } else {
      btn.style.opacity = "0";
      // трохи зачекаємо, щоб opacity встигло згаснути, і сховаємо display
      setTimeout(() => {
        const y2 = window.scrollY || document.documentElement.scrollTop;
        if (y2 <= 200) btn.style.display = "none";
      }, 200);
    }
  }

  window.addEventListener("scroll", update, { passive: true });
  window.addEventListener("resize", update);
  update();
})();
</script>

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
