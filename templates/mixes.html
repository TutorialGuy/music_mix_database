<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Список міксів</title>
</head>
<body>

<div id="top"></div>

<h2>Список міксів</h2>

<p style="margin-bottom:20px;">
    <a href="/" style="margin-right:15px;">🏠 На головну</a>
    <a href="/add-mix">➕ Додати мікс</a>
</p>

{% if not mixes %}
    <p>Поки що немає міксів.</p>
{% else %}
    <ul style="list-style:none;padding:0;">
        {% for mix in mixes %}
            <li style="display:flex;align-items:center;margin-bottom:10px;">

                {% if mix.cover %}
                    <img src="/{{ mix.cover }}"
                         style="width:60px;height:60px;object-fit:cover;border-radius:8px;margin-right:10px;">
                {% endif %}

                <div>
                  <a href="/mix/{{ mix.id }}">
                  <b>{{ mix.title }}</b>
                 </a>
                </div>

                <a href="/delete-mix/{{ mix.id }}"
                   onclick="return confirm('Ви впевнені, що хочете видалити цей мікс?');"
                   style="color:red;margin-left:20px;">
                   🗑 Видалити
                </a>

            </li>
        {% endfor %}
    </ul>
{% endif %}

<hr style="margin-top:30px;">

<p style="margin-top:15px;">
    <a href="/" style="margin-right:15px;">🏠 На головну</a>
    <a href="/add-mix">➕ Додати мікс</a>
</p>

<a href="#top"
   title="Вгору"
   style="
     position:fixed;
     right:18px;
     bottom:18px;
     background:#f2f2f2;
     border:1px solid #ccc;
     border-radius:12px;
     padding:10px 12px;
     text-decoration:none;
     color:#000;
     box-shadow:0 2px 6px rgba(0,0,0,0.15);
   ">⬆️</a>

<style>
  html { scroll-behavior: smooth; }
</style>

</body>
</html>
